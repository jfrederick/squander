# Xcode project definition. Regenerate Squander.xcodeproj with `xcodegen`
# after adding/removing files. The generated project is committed so CI and
# other machines don't need xcodegen installed.
name: Squander
options:
  bundleIdPrefix: dev.jimfrederick
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
packages:
  SquanderCore:
    path: SquanderCore
settings:
  base:
    SWIFT_VERSION: "6.0"
    CODE_SIGN_STYLE: Automatic
targets:
  Squander:
    type: application
    platform: iOS
    sources:
      - Squander
    dependencies:
      - package: SquanderCore
      - target: SquanderWidgets
        embed: true
    entitlements:
      path: Squander/Squander.entitlements
      properties:
        com.apple.security.application-groups:
          - group.dev.jimfrederick.squander
    # Explicit Info.plist (generated by xcodegen) instead of
    # GENERATE_INFOPLIST_FILE, because CFBundleURLTypes (the squander://
    # scheme the widget opens) cannot be expressed as INFOPLIST_KEY_
    # build settings.
    info:
      path: Squander/Info.plist
      properties:
        CFBundleDisplayName: Squander
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        # Generated empty launch screen: nothing may delay keypad readiness.
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        CFBundleURLTypes:
          - CFBundleURLName: dev.jimfrederick.squander
            CFBundleURLSchemes:
              - squander
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.jimfrederick.squander
        TARGETED_DEVICE_FAMILY: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: 0.1.0
  SquanderWidgets:
    type: app-extension
    platform: iOS
    # Squander/Models is compiled into both targets so the widget and the
    # intent share the schema, ExpenseStore write path, and container setup
    # without a separate framework.
    sources:
      - SquanderWidgets
      - Squander/Models
    dependencies:
      - package: SquanderCore
    entitlements:
      path: SquanderWidgets/SquanderWidgets.entitlements
      properties:
        com.apple.security.application-groups:
          - group.dev.jimfrederick.squander
    info:
      path: SquanderWidgets/Info.plist
      properties:
        CFBundleDisplayName: Squander
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.jimfrederick.squander.widgets
        TARGETED_DEVICE_FAMILY: "1"
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: 0.1.0
        SKIP_INSTALL: YES
  SquanderTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - SquanderTests
    dependencies:
      - target: Squander
      - package: SquanderCore
  SquanderUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - SquanderUITests
    dependencies:
      - target: Squander
schemes:
  Squander:
    build:
      targets:
        Squander: all
    test:
      gatherCoverageData: true
      targets:
        - SquanderTests
        - SquanderUITests
