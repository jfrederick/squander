# Xcode project definition. Regenerate Spendthrift.xcodeproj with `xcodegen`
# after adding/removing files. The generated project is committed so CI and
# other machines don't need xcodegen installed.
name: Spendthrift
options:
  bundleIdPrefix: dev.jimfrederick
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
packages:
  SpendthriftCore:
    path: SpendthriftCore
settings:
  base:
    SWIFT_VERSION: "6.0"
    CODE_SIGN_STYLE: Automatic
targets:
  Spendthrift:
    type: application
    platform: iOS
    sources:
      - Spendthrift
    dependencies:
      - package: SpendthriftCore
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.jimfrederick.spendthrift
        TARGETED_DEVICE_FAMILY: "1"
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: Spendthrift
        # Generated empty launch screen: nothing may delay keypad readiness.
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations: UIInterfaceOrientationPortrait
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: 0.1.0
  SpendthriftTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - SpendthriftTests
    dependencies:
      - target: Spendthrift
      - package: SpendthriftCore
  SpendthriftUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - SpendthriftUITests
    dependencies:
      - target: Spendthrift
schemes:
  Spendthrift:
    build:
      targets:
        Spendthrift: all
    test:
      gatherCoverageData: true
      targets:
        - SpendthriftTests
        - SpendthriftUITests
