# Xcode project definition. Regenerate Spendthrift.xcodeproj with `xcodegen`
# after adding/removing files. The generated project is committed so CI and
# other machines don't need xcodegen installed.
name: Spendthrift
options:
  bundleIdPrefix: dev.jimfrederick
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
packages:
  SpendthriftCore:
    path: SpendthriftCore
settings:
  base:
    SWIFT_VERSION: "6.0"
    CODE_SIGN_STYLE: Automatic
    # Keep the team here, NOT hand-edited into the pbxproj: xcodegen
    # regeneration silently reverts anything that isn't in this file (a
    # direct pbxproj edit of this value was lost exactly that way once).
    DEVELOPMENT_TEAM: WFF6AVLZNB
targets:
  Spendthrift:
    type: application
    platform: iOS
    sources:
      - Spendthrift
    dependencies:
      - package: SpendthriftCore
      - target: SpendthriftWidgets
        embed: true
    entitlements:
      path: Spendthrift/Spendthrift.entitlements
      properties:
        com.apple.security.application-groups:
          - group.dev.jimfrederick.spendthrift
    # Explicit Info.plist (generated by xcodegen) instead of
    # GENERATE_INFOPLIST_FILE, because CFBundleURLTypes (the spendthrift://
    # scheme the widget opens) cannot be expressed as INFOPLIST_KEY_
    # build settings.
    info:
      path: Spendthrift/Info.plist
      properties:
        CFBundleDisplayName: Spendthrift
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        # Generated empty launch screen: nothing may delay keypad readiness.
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        CFBundleURLTypes:
          - CFBundleURLName: dev.jimfrederick.spendthrift
            CFBundleURLSchemes:
              - spendthrift
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.jimfrederick.spendthrift
        TARGETED_DEVICE_FAMILY: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: 0.1.0
  SpendthriftWidgets:
    type: app-extension
    platform: iOS
    # Spendthrift/Models is compiled into both targets so the widget and the
    # intent share the schema, ExpenseStore write path, and container setup
    # without a separate framework.
    sources:
      - SpendthriftWidgets
      - Spendthrift/Models
    dependencies:
      - package: SpendthriftCore
    entitlements:
      path: SpendthriftWidgets/SpendthriftWidgets.entitlements
      properties:
        com.apple.security.application-groups:
          - group.dev.jimfrederick.spendthrift
    info:
      path: SpendthriftWidgets/Info.plist
      properties:
        CFBundleDisplayName: Spendthrift
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.jimfrederick.spendthrift.widgets
        TARGETED_DEVICE_FAMILY: "1"
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: 0.1.0
        SKIP_INSTALL: YES
  SpendthriftTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - SpendthriftTests
    dependencies:
      - target: Spendthrift
      - package: SpendthriftCore
  SpendthriftUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - SpendthriftUITests
    dependencies:
      - target: Spendthrift
schemes:
  Spendthrift:
    build:
      targets:
        Spendthrift: all
    test:
      gatherCoverageData: true
      targets:
        - SpendthriftTests
        - SpendthriftUITests
