# Xcode project definition. Regenerate Squander.xcodeproj with `xcodegen`
# after adding/removing files. The generated project is committed so CI and
# other machines don't need xcodegen installed.
name: Squander
options:
  bundleIdPrefix: dev.jimfrederick
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
packages:
  SquanderCore:
    path: SquanderCore
settings:
  base:
    SWIFT_VERSION: "6.0"
    CODE_SIGN_STYLE: Automatic
targets:
  Squander:
    type: application
    platform: iOS
    sources:
      - Squander
    dependencies:
      - package: SquanderCore
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.jimfrederick.squander
        TARGETED_DEVICE_FAMILY: "1"
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: Squander
        # Generated empty launch screen: nothing may delay keypad readiness.
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations: UIInterfaceOrientationPortrait
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: 0.1.0
  SquanderTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - SquanderTests
    dependencies:
      - target: Squander
      - package: SquanderCore
  SquanderUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - SquanderUITests
    dependencies:
      - target: Squander
schemes:
  Squander:
    build:
      targets:
        Squander: all
    test:
      gatherCoverageData: true
      targets:
        - SquanderTests
        - SquanderUITests
